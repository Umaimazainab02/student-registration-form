<!doctype html>
<html>

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link href="src/output.css" rel="stylesheet">
    <link rel="stylesheet" href="first.css">
    <title>Student Registration Form</title>
</head>

<body class="flex justify-center  bg-cover bg-center bg-no-repeat min-h-screen">    
    <div class="  bg-amber-50  w-70 lg:w-100 h-150 lg:h-115 mt-30 rounded-xl">
        <h1 class="bg-cyan-800 pt-5 pb-4 pl-10 lg:pl-20 font-bold text-md lg:text-xl text-white">Student Registration Form</h1>
        <div class="pl-10 pt-6 flex flex-col lg:flex-row">
            <h1 class="font-bold pt-1 pr-3">Name : </h1>
            <input type="text" placeholder="Name" class="border-4 border-cyan-700 w-50 lg:w-58 h-10 p-2 rounded-3xl" id="name">
        </div>
        <div class="pl-11 pt-6 flex flex-col lg:flex-row">
            <h1 class="font-bold pt-1 pr-3">Email : </h1>
            <input type="text" placeholder="Email" class="border-4 border-cyan-700 w-50 lg:w-58 h-10 p-2 rounded-3xl" id="email">
        </div>
        <div class="pl-11 lg:pl-4 pt-6 flex flex-col lg:flex-row">
            <h1 class="font-bold pt-1 pr-3">Password : </h1>
            <input type="text" placeholder="Password" class="border-4 border-cyan-700 w-50 lg:w-58 h-10 p-2 rounded-3xl" id="password">
        </div>
        <div class="pl-9 pt-6 flex flex-col lg:flex-row">
            <h1 class="font-bold pt-1 pr-3" id="course1">Course: </h1>
            <select id="course " class="border-4 border-cyan-700 w-51 lg:w-60 h-10 rounded-3xl">
                <option>Select a Course</option>
                <option>Web Development</option>
                <option>Graphic Design</option>
                <option>Digital Marketing</option>
                <option>AI Engineering</option>
                <option>Cyber Security</option>
            </select>
        </div>
        <div class="mt-8 ml-17 lg:ml-27 duration-600 ">
            <button class="text-lg hover:text-xl  border-4 border-cyan-700 bg-cyan-700 w-40 h-10  rounded-3xl  font-bold hover:shadow-2xl" id="btn1">Submit form</button>
        </div>
    </div>
    <script src="app.js"></script>
</body>

</html>
