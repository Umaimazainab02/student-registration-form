<!doctype html>
<html>

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link href="src/output.css" rel="stylesheet">
    <link rel="stylesheet" href="first.css">
</head>

<body class="flex justify-center bg-amber-200">
    <div class="border-4 border-amber-400 bg-amber-50  w-100 h-110 mt-30 rounded-b-xl">
        <h1 class="bg-amber-400 pt-5 pb-4 pl-20 font-bold text-xl">Student Registration Form</h1>
        <div class="pl-10 pt-6 flex flex-row">
            <h1 class="font-bold pt-1 pr-3">Name : </h1>
            <input type="text" class="border-4 border-amber-400 w-60 h-10 ">
        </div>
        <div class="pl-11 pt-6 flex flex-row">
            <h1 class="font-bold pt-1 pr-3">Email : </h1>
            <input type="text" class="border-4 border-amber-400 w-60 h-10 ">
        </div>
        <div class="pl-4 pt-6 flex flex-row">
            <h1 class="font-bold pt-1 pr-3">Password : </h1>
            <input type="text" class="border-4 border-amber-400 w-60 h-10 ">
        </div>
        <div class="pl-9 pt-6 flex flex-row">
            <h1 class="font-bold pt-1 pr-3">Course : </h1>
            <select id="course " class="border-4 border-amber-400 w-60 h-10 ">
                <option>Select a Course</option>
                <option>Web Development</option>
                <option>Graphic Design</option>
                <option>Digital Marketing</option>
                <option>AI Engineering</option>
                <option>Cyber Security</option>
            </select>
        </div>
        <div class="mt-8 ml-27">
            <button class="border-4 border-amber-400 bg-amber-400 w-40 h-10 rounded-3xl ">Submit form</button>
        </div>
    </div>
</body>

</html>
